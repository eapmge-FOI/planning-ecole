<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Planning école police</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Planificateur école police</h1>

  <div class="card">
    <h2>Paramètres</h2>

    <div style="margin-bottom: 10px;">
      <label for="dateDebutInput">Date de début :</label>
      <input type="date" id="dateDebutInput">
    </div>

    <div style="margin-bottom: 10px;">
      <label for="aspirantsInput">Nombre d’aspirants :</label>
      <input type="number" id="aspirantsInput" min="1" value="35">
    </div>

    <button onclick="loadData()">Calculer la charge école</button>
  </div>

  <div class="card">
    <h2>Résumé</h2>
    <div id="summary"></div>
  </div>

  <div class="card">
    <h2>Cours et ressources</h2>

    <table id="coursesTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Leçon</th>
          <th>Type</th>
          <th>Durée (min)</th>
          <th>Capacité</th>
          <th>Division</th>
          <th>Simultané</th>
          <th>Groupes</th>
          <th>Séances</th>
          <th>Heures</th>
          <th>Encadrants</th>
          <th>Véhicules D1</th>
          <th>Salles supp.</th>
          <th>Contrainte</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="app.js"></script>

</body>
</html>
